<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" href="../css/osnovno.css" />

    <title>DIGIRN</title>
  </head>
  <body>
    <header>
      <div id="header-container"></div>
      <img
        src="../assets/digirn.png"
        alt="digrn logo"
        width="150"
        height="150"
      />
      <h2>DIGIRN</h2>
      </div>
      <nav>
        <ul>
          <li><a href="../html/index.html">Glavna</a></li>

          <li><a href="../html/lista.html">Nalozi</a></li>
        </ul>
        <div id="hamburger-icon">
          <div class="bar1"></div>
          <div class="bar2"></div>
          <div class="bar3"></div>
        </div>
      </nav>
    </header>
    <main>
      <aside>
        <nav>
          <ul>
            <li><a href="lista.html">Nalozi</a></li>

            <li><a href="index.html">Glavna</a></li>

            <li><a href="Prikaz.html">Prikaz naloga</a></li>

            <li><a href="Unos.html">Unos naloga</a></li>
            <li><a href="izmjena.html">Izmjena naloga</a></li>
          </ul>
        </nav>
      </aside>
      <section>
        <h1>Izmjena naloga</h1>
        <form action="">
          <hr>
          <div class="container">
          <label for="Broj_naloga">Broj naloga:</label>
          <input
            type="text"
            id="Broj_naloga"
            name=""
            maxlength="10"
            size="10"
          /></div>
          <hr />
          <div class="container">
          <label for="Narudžbenica">Narudžbenica:</label>
          <input
            type="text"
            id="Narudžbenica"
            name=""
            maxlength="10"
            size="10"
          /></div>
          <div class="container">
          <label for="Datum_naloga">Datum otvaranja</label>
          <input type="date" id="Datum_naloga" name="Datum_naloga" required />
          </div>
          <hr />
          <div class="container">
          <label for="naručitelj">Naručitelj:</label>
          <input
            type="text"
            id="naručitelj"
            name="naručitelj"
            maxlength="15 "
            size="15"
          /></div>
          <hr />
          <div class="container">
          <label for="izvršitelj">Izvršitelj:</label>
          <input
            type="text"
            id="izvršitelj"
            name="izvršitelj"
            maxlength="15"
            size="15"
          /></div>
        
          <hr />
          <div class="container">
          <label for="mjesto_troška">Mjesto troška:</label>
          <input
            type="text"
            id="mjesto_troška"
            name="mjesto_troška"
            maxlength="15"
            size="15"
          /></div>
          <hr />
          <div class="container">
          <label for="nositelj_troška">Nositelj troška:</label>
          <input
            type="text"
            id="nositelj_troška"
            name="nositelj_troška"
            maxlength="15"
            size="15"
          /></div>
          <hr />
          <div class="container">
          <label for="">Datum početka</label>
          <input type="date" name="datum_početka" id="datum_početka" />
          <label for="vrijeme_  početka">Vrijeme početka</label>
          <input type="time" name="vrijeme_početka" id="vrijeme_početka" />
          <br />
          <div class="container">
          <label for="">Datum završetka</label>
          <input type="date" name="datum_završetka" id="datum_završetka" />
          <label for="vrijeme_završetka">Vrijeme završetka</label>
          <input type="time" name="vrijeme_završetka" id="vrijeme_završetka" />
          <br />
          <br />
          <hr /><div>
          <label for="naslov">Naslov</label>
          <input type="text" name="naslov" id="naslov" /></div>
          <hr />
          <div class="container">
          <label for="opis">Opis</label>
          <textarea name="opis" id="opis" maxlength="50"></textarea></div>
          <hr />
          <button type="submit">Uredu</button>
          <button type="reset">Poništi</button>
        </form>
      </section>
    </main>
  </body>
</html>
