<html lang="en">
<head>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/4.7.8/handlebars.min.js" integrity="sha512-E1dSFxg+wsfJ4HKjutk/WaCzK7S2wv1POn1RRPGh8ZK+ag9l244Vqxji3r6wgz9YBf6+vhQEYJZpSjqWFPg9gg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script> -->
    <title>v14 - webpack</title>
<body>
    
    <script id="hb-template" type="text/x-handlebars-template">
        <table class={{tableClass}}>
            <tr>
                <th class="d-sm-table-cell d-none">#</th>
                <th class="d-table-cell">Ime</th>
                <th class="d-sm-table-cell d-none">Priorodno stanište</th>
                <th class="d-sm-table-cell d-none">Brzina rasta</th>
            </tr>
            {{#each pokemon}}
            <tr>
                <td class="d-sm-table-cell d-none">{{@index}}</td>
                <td class="d-table-cell"><a data-bs-trigger="hover" data-bs-toggle="popover" data-bs-title="{{name}}" data-bs-content={{url}} href="{{url}}">{{name}}</a></td>
                <td class="d-sm-table-cell d-none">{{habitat}}</td>
                <td class="d-sm-table-cell d-none">{{growth_rate}}</td>
            </tr>
            {{/each}}
        </table>
    </script>
    <div id="hb-result"></div>
    <script src="./dist/myscripts.js"></script>
</body>
</html>
