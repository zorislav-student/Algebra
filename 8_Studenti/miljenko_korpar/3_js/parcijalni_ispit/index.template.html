<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link href="https://api.fontshare.com/v2/css?f[]=zodiak@400,500,700&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>iTunes tražilica</title>
</head>
<body>
    <header>
        <img class="header-item" src="images/logo.png">
        <h1 class="header-item" >iTunes tražilica pjesama</h1>
    </header>
    <main>
        <input type="text" placeholder="Upište naziv pjesme ili izvođača">
        <div class="loader hidden"></div>
        <p class="no-songs-info">Nema pronađenih pjesama</p>
        <table class="songs-table hidden">
            <thead>
                <tr>
                    <th>Autor</th>
                    <th>Pjesma</th>
                </tr>
            </thead>
            <tbody></tbody>
            <tfoot>
                <tr>
                    <th>Total songs</th>
                    <th></th>
                </tr>
            </tfoot>
        </table>
    </main>
    <!-- SCRIPT_PLACEHOLDER -->
    <!-- <script type="module" src="index.js"></script> -->
    <!-- <script src="bundle.js"></script> -->
</body>
</html>
