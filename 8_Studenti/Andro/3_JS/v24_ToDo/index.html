<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>My Tasks</h1>
      <div class="button-group">
        <button disabled>All</button>
        <button>Active</button>
        <button>Completed</button>
      </div>
    </header>
    <main>
      <div id="section-todo">
        <div id="section-input">
          <input id="input-text" type="text" name="" />
          <input id="input-add" type="submit" value="Add" />
        </div>
        <ul class="ul-todo">
          <li>1</li>
          <li>2</li>
        </ul>
      </div>
      <div id="section-clear-completed">
        <button id="button-clear-completed">Clear completed</button>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
