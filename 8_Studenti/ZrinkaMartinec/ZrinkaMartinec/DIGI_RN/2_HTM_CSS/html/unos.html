<!doctype html>
<html lang="hr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/osnovno.css" />
    <link rel="stylesheet" href="../css/unos.css" />
    <title>Unos naloga</title>
  </head>
  <body>
    <header>
      <div id="header-container">
       <img src="../assets/digirn.png" alt="digirnlogo" width="150" />
      <h2>DIGIRN</h2>
      </div>      
      <nav>
        <ul>
          <li><a href="../index_digirn.html">Glavna stranica</a></li>
          <li><a href="lista.html">Nalozi</a></li>
        </ul>
      </nav>
      <div id="hamburger icon">
        <div class="bar1"></div>
        <div class="bar2"></div>
        <div class="bar3"></div>
        </div>
      </header>       
        <main>
        <section>
        <h1>Unos naloga</h1>
        <form action="">  
        <hr>
        <div class="container">
        <label for="broj naloga" >Broj naloga</label>
        <input type="text" id="broj naloga" name="broj naloga" maxlength="10" size="10" required>
        <label for="narudzbenica">Narudžbenica</label>
        <input type="text" id="narudzbenica" name="narudzbenica" maxlength="10" size="10" required>
        <label for="datum_naloga">Datum otvaranja</label>  
        <input type="date" id="datum_naloga" name="datum_naloga" required>
        </div>
        <hr>
        <div class="container">
        <label for="narucitelj">Naručitelj</label>
        <input type="text" id="narucitelj" name="narucitelj" maxlength="15" size="15">
        <label for="izvrsitelj">Izvršitelj</label>
        <input type="text" id="izvrsitelj" name="izvrsitelj" maxlength="15" size="15" required>
        </div>        
        <hr>
        <div class="container">
        <label for="mjesto troska">Mjesto troška</label>
        <input type="text id=mjesto troska" name="mjesto troska" maxlength="15" size="15" required>
        <label for="nositelj troska">Nositelj troška</label>
        <input type="text" id="nositelj troska" name="nositelj troska" maxlength="15" size="15" required>
        </div>        
        <hr>
        <div class="container">
        <label for="datum pocetka">Datum početka:</label>
        <input type="date" id="datum pocetka" name="datum pocetka">
        <label for="vrijeme pocetka">Vrijeme početka:</label>
        <input type="time" id="vrijeme pocetka" name="vrijeme pocetka">
        </div>        
        <br>
        <div class="container">
        <label for="datum zavrsetka">Datum završetka:</label>
        <input type="date" id="datum zavrsetka" name="datum zavrsetka">
        <label for="vrijeme zavrsetka">Vrijeme završetka:</label>
        <input type="time" id="vrijeme zavrsetka" name="vrijeme zavrsetka">
        </div>        
        <hr>
        <div class="container">
        <label for="naslov">Naslov</label>
        <input type="text" id="naslov" name="naslov" >
        </div>
        <hr>
        <div class="container">
        <label for="opis rada">Opis rada</label>     
        <textarea id="opis rada" name="opis rada" maxlength="50" cols="20" rows="5"></textarea> 
      </div>        
        <hr>    
        <div class="button-container">    
        <button type="reset">Poništi</button>
        <button type="submit">U redu</button>
        </div>
        

        </form>
        </section>
      </body>    
</html>
